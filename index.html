<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sihha Fitness</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="stylesheet" href="styles.css">
    <!-- Modern typography for a clean, legible look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app-container">
        <!-- Header with Night Mode Toggle -->
        <header id="app-header">
            <h1>Sihha</h1>
            <button id="theme-toggle" aria-label="Toggle Night Mode">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <!-- Main Content Area -->
        <main id="content">
            <!-- Calories View -->
            <section id="view-calories" class="view-section active">
                <h2>Today's Calories</h2>
                
                <!-- Summary Card -->
                <div class="card summary-card">
                    <div class="progress-bar-container">
                        <div id="cal-progress" class="progress-bar" style="width: 0%"></div>
                    </div>
                    <div class="cal-stats">
                        <div class="stat">
                            <span class="label">Consumed</span>
                            <span id="cal-consumed" class="value">0</span>
                        </div>
                        <div class="stat main-stat">
                            <span class="label">Net Calories</span>
                            <span id="cal-net" class="value">0</span>
                        </div>
                        <div class="stat">
                            <span class="label">Burned</span>
                            <span id="cal-burned" class="value">0</span>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="card input-card">
                    <h3>Log Activity</h3>
                    <div class="input-group">
                        <label for="cal-amount">Amount (kcal)</label>
                        <input type="number" id="cal-amount" placeholder="e.g. 350" min="0">
                    </div>
                    <div class="input-actions">
                        <button class="btn btn-add" id="btn-add-food">
                            <i class="fas fa-utensils"></i> Add Food
                        </button>
                        <button class="btn btn-burn" id="btn-add-burn">
                            <i class="fas fa-fire-alt"></i> Add Burn
                        </button>
                    </div>
                    <!-- Reset button for today -->
                    <button class="btn btn-outline" id="btn-reset-cal" style="margin-top: 1rem; width: 100%;">
                        <i class="fas fa-undo"></i> Reset Today
                    </button>
                </div>
            </section>
            
            <!-- Schedule View -->
            <section id="view-schedule" class="view-section">
                <h2>Workout Schedule</h2>
                <p>Content coming in Step 4.</p>
            </section>

            <!-- Timer View -->
            <section id="view-timer" class="view-section">
                <h2>Workout Timer</h2>
                <p>Content coming in Step 5.</p>
            </section>

            <!-- Trophies View -->
            <section id="view-trophies" class="view-section">
                <h2>Trophy Room</h2>
                <p>Content coming in Step 6.</p>
            </section>
        </main>
        
        <!-- Bottom Navigation Bar -->
        <nav id="bottom-nav">
            <button class="nav-btn active" data-target="view-calories">
                <i class="fas fa-fire"></i>
                <span>Calories</span>
            </button>
            <button class="nav-btn" data-target="view-schedule">
                <i class="fas fa-calendar-check"></i>
                <span>Schedule</span>
            </button>
            <button class="nav-btn" data-target="view-timer">
                <i class="fas fa-stopwatch"></i>
                <span>Timer</span>
            </button>
            <button class="nav-btn" data-target="view-trophies">
                <i class="fas fa-trophy"></i>
                <span>Trophies</span>
            </button>
        </nav>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
